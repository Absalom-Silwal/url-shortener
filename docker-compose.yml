version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: dockerfile-backend
    container_name: url-shortner
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/url-shortner
      
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongo:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  
  redis:
    image: redis:alpine
    ports: 
    - "6379:6379"

volumes:
  mongo-data:
